# Zenodo metadata for top2018 full-filtered dataset
# Used by: python pipeline/publish_to_zenodo.py top2018_full/

title: >-
  pydangle top2018 full: Geometric measurements and classifications
  for 12,125 high-quality protein chains with residue filtering based
  on main chain and side chain metrics

description: >-
  Per-residue backbone geometry (phi, psi, omega, tau), sidechain torsion
  (chi1), Ramachandran classifications, and DSSP secondary structure for
  2,355,814 quality-filtered protein residues from 11,843 high-resolution,
  low-redundancy protein chains. Computed using pydangle-biopython v0.5.1
  on "ersatz" full-structure PDB files that preserve multi-chain context
  for correct DSSP assignments. Source data from the Richardson Lab top2018
  dataset (Williams et al., 2021, doi:10.1002/pro.4239), full-filtered,
  70% homology, 60% completeness. See README.md for full methodology and
  reproduction instructions.

